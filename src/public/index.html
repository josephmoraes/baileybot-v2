<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BaileyBot V2</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-dark text-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">

        <div class="container-fluid">

            <div>

                <span class="navbar-brand fw-bold">
                    <i class="bi bi-whatsapp text-success"></i>
                    BaileyBot V2
                </span>

                <div class="small text-secondary">
                    Sistema de automação para WhatsApp
                </div>

            </div>

            <span class="badge bg-danger fs-6" id="statusWhatsapp">
                Desconectado
            </span>

        </div>

    </nav>

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->
            <aside class="col-lg-2 bg-black border-end border-secondary min-vh-100">

                <div class="list-group list-group-flush mt-4">

                    <a href="#" class="list-group-item list-group-item-action bg-black text-light border-secondary active">
                        <i class="bi bi-speedometer2 me-2"></i>
                        Dashboard
                    </a>

                    <a href="#" class="list-group-item list-group-item-action bg-black text-light border-secondary">
                        <i class="bi bi-people me-2"></i>
                        Clientes
                    </a>

                    <a href="#" class="list-group-item list-group-item-action bg-black text-light border-secondary">
                        <i class="bi bi-send me-2"></i>
                        Campanhas
                    </a>

                    <a href="#" class="list-group-item list-group-item-action bg-black text-light border-secondary">
                        <i class="bi bi-chat-dots me-2"></i>
                        Mensagens
                    </a>

                    <a href="#" class="list-group-item list-group-item-action bg-black text-light border-secondary">
                        <i class="bi bi-gear me-2"></i>
                        Configurações
                    </a>

                </div>

            </aside>

            <!-- Conteúdo -->
            <main class="col-lg-10 py-4">

                <h1 class="mb-4">Dashboard</h1>

                <!-- Cards -->
                <div class="row g-4">

                    <div class="col-md-6 col-xl-3">

                        <div class="card bg-secondary text-light border-0 shadow h-100">

                            <div class="card-body">

                                <div class="d-flex justify-content-between align-items-center">

                                    <div>

                                        <h2 id="totalClientes">0</h2>

                                        <p class="text-light-emphasis mb-0">
                                            Clientes cadastrados
                                        </p>

                                    </div>

                                    <i class="bi bi-people fs-1 text-primary"></i>

                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-6 col-xl-3">

                        <div class="card bg-secondary text-light border-0 shadow h-100">

                            <div class="card-body">

                                <div class="d-flex justify-content-between align-items-center">

                                    <div>

                                        <h2 id="totalCampanhas">0</h2>

                                        <p class="text-light-emphasis mb-0">
                                            Campanhas criadas
                                        </p>

                                    </div>

                                    <i class="bi bi-send fs-1 text-warning"></i>

                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-6 col-xl-3">

                        <div class="card bg-secondary text-light border-0 shadow h-100">

                            <div class="card-body">

                                <div class="d-flex justify-content-between align-items-center">

                                    <div>

                                        <h2 id="totalMensagens">0</h2>

                                        <p class="text-light-emphasis mb-0">
                                            Mensagens enviadas
                                        </p>

                                    </div>

                                    <i class="bi bi-chat-dots fs-1 text-info"></i>

                                </div>

                            </div>

                        </div>

                    </div>

                    <div class="col-md-6 col-xl-3">

                        <div class="card bg-secondary text-light border-0 shadow h-100">

                            <div class="card-body">

                                <div class="d-flex justify-content-between align-items-center">

                                    <div>

                                        <h2 id="statusTexto">Offline</h2>

                                        <p class="text-light-emphasis mb-0">
                                            Status da conexão
                                        </p>

                                    </div>

                                    <i class="bi bi-whatsapp fs-1 text-success"></i>

                                </div>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- Tabela -->
                <div class="card bg-secondary text-light border-0 shadow mt-5">

                    <div class="card-header d-flex justify-content-between align-items-center">

                        <span>Últimas campanhas</span>

                        <div class="d-flex gap-2">

                            <button class="btn btn-success btn-sm">
                                <i class="bi bi-plus-circle"></i>
                                Nova
                            </button>

                            <button class="btn btn-primary btn-sm">
                                <i class="bi bi-file-earmark-excel"></i>
                            </button>

                            <button class="btn btn-outline-light btn-sm">
                                <i class="bi bi-arrow-clockwise"></i>
                            </button>

                        </div>

                    </div>

                    <div class="table-responsive">

                        <table class="table table-dark table-hover align-middle mb-0">

                            <thead>

                                <tr>

                                    <th>Nome</th>
                                    <th>Status</th>
                                    <th>Data</th>
                                    <th width="120">Ações</th>

                                </tr>

                            </thead>

                            <tbody>

                                <tr>

                                    <td colspan="4" class="text-center text-secondary py-4">
                                        Nenhuma campanha cadastrada.
                                    </td>

                                </tr>

                            </tbody>

                        </table>

                    </div>

                </div>

            </main>

        </div>

    </div>

    <script src="/js/app.js"></script>

</body>

</html>
