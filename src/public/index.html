<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>BaileyBot V2</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="/css/style.css">
</head>

<body class="bg-dark text-light">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-black border-bottom border-secondary">

        <div class="container-fluid">

            <div>
                <span class="navbar-brand fw-bold">
                    <i class="bi bi-whatsapp text-success"></i>
                    BaileyBot V2
                </span>

                <div class="small text-secondary">
                    Sistema de automação para WhatsApp
                </div>
            </div>

            <span class="badge bg-danger fs-6" id="statusWhatsapp">
                Desconectado
            </span>

        </div>

    </nav>

    <div class="container-fluid">

        <div class="row">

            <!-- Sidebar -->
            <aside class="col-lg-2 bg-black border-end border-secondary min-vh-100">

                <div class="list-group list-group-flush mt-4">

                    <a href="#"
                        class="list-group-item list-group-item-action bg-black text-light border-secondary active"
                        data-page="dashboard">
                        <i class="bi bi-speedometer2 me-2"></i>
                        Dashboard
                    </a>

                    <a href="#"
                        class="list-group-item list-group-item-action bg-black text-light border-secondary"
                        data-page="clientes">
                        <i class="bi bi-people me-2"></i>
                        Clientes
                    </a>

                    <a href="#"
                        class="list-group-item list-group-item-action bg-black text-light border-secondary"
                        data-page="campanhas">
                        <i class="bi bi-send me-2"></i>
                        Campanhas
                    </a>

                    <a href="#"
                        class="list-group-item list-group-item-action bg-black text-light border-secondary"
                        data-page="mensagens">
                        <i class="bi bi-chat-dots me-2"></i>
                        Mensagens
                    </a>

                    <a href="#"
                        class="list-group-item list-group-item-action bg-black text-light border-secondary"
                        data-page="configuracoes">
                        <i class="bi bi-gear me-2"></i>
                        Configurações
                    </a>

                </div>

            </aside>

            <!-- Conteúdo -->
            <main class="col-lg-10 py-4">

                <div id="content"></div>

            </main>

        </div>

    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Router -->
    <script src="/js/router.js"></script>

    <!-- Dashboard -->
    <script src="/js/dashboard.js"></script>

    <!-- Clientes -->
    <script src="/js/clientes.js"></script>

    <!-- App -->
    <script src="/js/app.js"></script>

</body>

</html>
